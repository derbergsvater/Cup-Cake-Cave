<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Die Cup-Cake-Höhlen</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-deep: #120f1a;
            --bg-mid: #24142f;
            --bg-glow: #ff6aa2;
            --frame: #ffd166;
            --text: #fff7ef;
        }
        body {
            font-family: 'Outfit', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            color: var(--text);
            background:
                radial-gradient(circle at 15% 20%, rgba(255, 106, 162, 0.22), transparent 40%),
                radial-gradient(circle at 80% 10%, rgba(76, 201, 240, 0.18), transparent 35%),
                linear-gradient(135deg, var(--bg-deep), var(--bg-mid));
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            opacity: 0.22;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.08) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        #game-container {
            width: 800px;
            height: 600px;
            max-width: 100vw;
            max-height: 100vh;
            border: 2px solid rgba(255, 209, 102, 0.95);
            border-radius: 18px;
            box-shadow:
                0 22px 48px rgba(0, 0, 0, 0.45),
                0 0 40px rgba(255, 106, 162, 0.25),
                inset 0 0 0 1px rgba(255, 255, 255, 0.12);
            overflow: hidden;
        }
        @media (max-width: 820px) {
            #game-container {
                width: 100vw;
                height: 56.25vw;
                max-height: 100vh;
                border-radius: 0;
                border: none;
            }
        }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <script src="js/audio.js?v=20260314"></script>
    <script src="js/assets.js?v=20260314"></script>
    <script src="js/scenes/BootScene.js?v=20260314"></script>
    <script src="js/scenes/MenuScene.js?v=20260314"></script>
    <script src="js/scenes/GameScene.js?v=20260314"></script>
    <script src="js/scenes/GameOverScene.js?v=20260314"></script>
    <script src="js/game.js?v=20260314"></script>
</body>
</html>
